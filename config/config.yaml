# Garmin Connect 自动化配置
# 敏感信息请使用 .env 文件，不要在此处填写

garmin:
  # 账号信息（建议用环境变量覆盖）
  email: ${GARMIN_EMAIL}
  password: ${GARMIN_PASSWORD}
  # 中国区账号设为 true
  is_cn: true
  # MFA 验证码输入方式: "prompt" | "env"
  mfa_mode: prompt
  # Token 存储路径
  token_dir: ~/.garminconnect-cn

sync:
  # 数据导出目录
  data_dir: ./data
  # 增量同步：仅导出上次同步后的新数据
  incremental: true
  # 同步记录文件
  sync_state_file: ./config/sync_state.json
  # 导出数据类别（全部启用）
  categories:
    - user_profile
    - daily_health
    - advanced_health
    - historical
    - activities
    - body_composition
    - goals
    - device
    - gear
    - hydration
    - training_plans
    - golf
  # 活动数据回溯天数（首次同步时）
  activity_lookback_days: 365

api_server:
  # REST API 服务配置
  host: 127.0.0.1
  port: 8190
  # API Key 认证（建议用环境变量）
  api_key: ${GARMIN_API_KEY}

scheduler:
  # 每日同步时间 (HH:MM)
  daily_sync_time: "07:00"
  # 同步失败重试次数
  retry_attempts: 3
  # 重试间隔(秒)
  retry_delay: 60

logging:
  level: INFO
  file: ./logs/garmin-automation.log
  max_size_mb: 50
  backup_count: 5
